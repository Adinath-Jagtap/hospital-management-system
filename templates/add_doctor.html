{% extends "base.html" %}
{% block title %}Add Doctor{% endblock %}
{% block content %}
<h2 class="mb-4">➕ Add New Doctor</h2>
<div class="card shadow">
    <div class="card-body">
        <form method="POST">
            <div class="row">
                <div class="col-md-6 mb-3">
                    <label for="name" class="form-label">Full Name *</label>
                    <input type="text" class="form-control" id="name" name="name" required>
                </div>
                <div class="col-md-6 mb-3">
                    <label for="username" class="form-label">Username *</label>
                    <input type="text" class="form-control" id="username" name="username" required>
                </div>
            </div>
            <div class="row">
                <div class="col-md-6 mb-3">
                    <label for="password" class="form-label">Password *</label>
                    <input type="password" class="form-control" id="password" name="password" required minlength="6">
                </div>
                <div class="col-md-6 mb-3">
                    <label for="email" class="form-label">Email *</label>
                    <input type="email" class="form-control" id="email" name="email" required>
                </div>
            </div>
            <div class="row">
                <div class="col-md-6 mb-3">
                    <label for="phone" class="form-label">Phone *</label>
                    <input type="tel" class="form-control" id="phone" name="phone" required>
                </div>
                <div class="col-md-6 mb-3">
                    <label for="department_id" class="form-label">Department *</label>
                    <select class="form-select" id="department_id" name="department_id" required>
                        <option value="">Select Department</option>
                        {% for dept in departments %}
                        <option value="{{ dept._id }}">{{ dept.name }}</option>
                        {% endfor %}
                    </select>
                </div>
            </div>
            <div class="row">
                <div class="col-md-6 mb-3">
                    <label for="specialization" class="form-label">Specialization *</label>
                    <input type="text" class="form-control" id="specialization" name="specialization" required>
                </div>
                <div class="col-md-6 mb-3">
                    <label for="qualification" class="form-label">Qualification *</label>
                    <input type="text" class="form-control" id="qualification" name="qualification" required placeholder="e.g., MBBS, MD">
                </div>
            </div>
            <div class="mb-3">
                <label for="experience" class="form-label">Years of Experience *</label>
                <input type="number" class="form-control" id="experience" name="experience" required min="0" max="50">
            </div>
            <div class="d-grid gap-2 d-md-flex justify-content-md-end">
                <a href="{{ url_for('admin_doctors') }}" class="btn btn-secondary">Cancel</a>
                <button type="submit" class="btn btn-primary">Add Doctor</button>
            </div>
        </form>
    </div>
</div>
{% endblock %}
